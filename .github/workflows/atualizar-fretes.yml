name: Atualizar fretes da planilha
on:
  schedule:
    - cron: '30 12 * * *'  # 09:30 no horário de Brasília (UTC-3)
  push:
    branches:
      - main
    paths:
      - 'scripts/cargas.xlsx'  # dispara automaticamente sempre que essa planilha mudar
  workflow_dispatch: {}        # permite rodar manualmente pela aba "Actions" do GitHub
jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install xlsx firebase-admin
      - name: Importar planilha de fretes
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        run: node scripts/importar-fretes.cjs 